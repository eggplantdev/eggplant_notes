# pnpm 11 reads these settings here (no longer from package.json's "pnpm" field).
# Force the postcss security floor across the transitive graph.
overrides:
  "postcss@<8.5.10": ">=8.5.10"

# Build-script allowlist (replaces v10's onlyBuiltDependencies/ignoredBuiltDependencies).
# sharp/unrs-resolver ship prebuilt binaries — skip their build scripts.
allowBuilds:
  esbuild: true
  msw: false # transitive via @vitest/mocker; build only needed for browser-mode (service worker), not Node tests
  sharp: false
  unrs-resolver: false
