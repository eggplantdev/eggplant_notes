# ============================================================================
# Daily Supabase Postgres → FTPS Backup (recovery-grade, READ-ONLY, token-free)
# ============================================================================
# Produces the official-equivalent recovery artifact — roles + schema + data —
# as one tarball, shipped off-site via FTPS. A single whole-DB pg_dump is NOT a
# clean restore target; this mirrors the proven scripts/db-dump.sh shape (public
# DDL + auth/public/storage data + committed roles). Restore with
# scripts/db-restore-local.sh, or the psql sequence in
# context/foundation/lessons.md, into an EMPTY target, then resync sequences.
#
# READ-ONLY + TOKEN-FREE: dumps as the backup_ro role (pg_read_all_data, bypassrls,
# no write) via raw pg_dump. No Supabase access token — `supabase db dump` can't run
# as backup_ro (SET ROLE postgres denied), and a PAT can't be scoped read-only anyway.
#
# Secrets required (repo → Settings → Secrets and variables → Actions):
#   - SUPABASE_DB_URL : the backup_ro Session-pooler connection string (port 5432).
#       Role setup (run once in the Supabase SQL editor):
#         create role backup_ro login password '<strong>';
#         grant pg_read_all_data to backup_ro;
#         alter role backup_ro with bypassrls;     -- read auth.* etc.
#       Username at the pooler is backup_ro.<project-ref>. Read-only: a leaked
#       secret can only read, never mutate. GitHub runners are IPv4-only → use the
#       pooler host, not db.<ref>.supabase.co. Session mode (5432), not txn (6543).
#   - FTP_HOST / FTP_USER / FTP_PASS : the off-site FTPS server.
# ============================================================================

name: Backup Supabase DB

on:
  schedule:
    - cron: '0 2 * * *'   # daily 02:00 UTC
  workflow_dispatch:

jobs:
  backup-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4   # for supabase/roles.sql

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Dump (read-only, 3-file)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          STAMP=$(date +%Y%m%d-%H%M%S)
          DIR="eggplant-backup-${STAMP}"
          mkdir -p "$DIR"
          pgdump() { docker run --rm -e U="$SUPABASE_DB_URL" postgres:17-alpine sh -c "pg_dump \"\$U\" $*"; }

          cp supabase/roles.sql "$DIR/roles.sql"
          pgdump --schema-only --schema=public | sed '/^CREATE SCHEMA public;$/d' > "$DIR/schema.sql"
          pgdump --data-only --schema=auth --schema=public --schema=storage \
            --exclude-table=storage.buckets_vectors --exclude-table=storage.vector_indexes > "$DIR/data.sql"

          tar -czf "${DIR}.tar.gz" "$DIR"
          echo "BACKUP_DIR=$DIR"            >> "$GITHUB_ENV"
          echo "BACKUP_FILE=${DIR}.tar.gz"  >> "$GITHUB_ENV"
          echo "✅ Backup created: ${DIR}.tar.gz"

      # Content checks beat size alone (a frozen/empty dump stays "big enough").
      - name: Validate Backup
        run: |
          set -euo pipefail
          D="${{ env.BACKUP_DIR }}"
          grep -q 'ROLE'         "$D/roles.sql"  || { echo "❌ roles.sql empty";  exit 1; }
          grep -q 'CREATE TABLE' "$D/schema.sql" || { echo "❌ schema.sql empty"; exit 1; }
          grep -q '^COPY '       "$D/data.sql"   || { echo "❌ data.sql empty";   exit 1; }
          SIZE=$(stat --format=%s "${{ env.BACKUP_FILE }}")
          [ "$SIZE" -ge 1024 ] || { echo "❌ tarball too small ($SIZE bytes)"; exit 1; }
          echo "📦 Validated — $SIZE bytes (roles + schema + data all non-empty)"

      - name: Upload via FTPS and Clean Old Backups
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          REMOTE_DIR: /db_backup_eggplant_ai_notes/
        run: |
          lftp -c "
            set ftp:ssl-auth TLS
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            mkdir -p -f '$REMOTE_DIR';
            put -O '$REMOTE_DIR' '${{ env.BACKUP_FILE }}';
            bye
          "
          echo "✅ Upload complete"

          # --- Prune backups older than 7 days ---
          CUTOFF=$(date -d '7 days ago' +%Y%m%d)
          FILE_LIST=$(lftp -c "
            set ftp:ssl-auth TLS
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            cd '$REMOTE_DIR';
            cls -1 *.tar.gz
          ")
          DELETE_CMDS=""
          while read -r FILE; do
            [ -z "$FILE" ] && continue
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
            if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF" ]; then
              echo "🗑️ Will delete: $FILE"
              DELETE_CMDS="${DELETE_CMDS}rm '${REMOTE_DIR}${FILE}';"
            fi
          done <<< "$FILE_LIST"
          if [ -n "$DELETE_CMDS" ]; then
            lftp -c "
              set ftp:ssl-auth TLS
              set ftp:ssl-force true
              set ftp:ssl-protect-data true
              set ssl:verify-certificate no
              open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
              ${DELETE_CMDS}
            "
          fi
          echo "✅ Cleanup complete — kept last 7 days of backups"
