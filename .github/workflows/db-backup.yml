# ============================================================================
# Daily Supabase Postgres → FTPS Backup (recovery-grade, 3-file method)
# ============================================================================
# Produces the OFFICIAL Supabase backup — roles + schema + data — bundled as one
# tarball and shipped off-site via FTPS. A single pg_dump is NOT restorable
# (no cluster-level roles, mangled ownership); see scripts/README.md and
# context/foundation/lessons.md ("A single pg_dump is NOT a Supabase recovery
# artifact"). Restore with the psql sequence documented there, into an EMPTY
# target, then resync sequences.
#
# What it does:
#   1. Installs the Supabase CLI and links the project (via access token)
#   2. Dumps roles.sql + schema.sql + data.sql with `supabase db dump --linked`
#   3. Bundles them into one timestamped .tar.gz
#   4. Validates each file actually has content (not just tarball size)
#   5. Uploads via secure FTPS and prunes copies older than 7 days
#
# Secrets required (GitHub repo → Settings → Secrets and variables → Actions):
#   - SUPABASE_ACCESS_TOKEN : a Supabase personal access token
#       (supabase.com/dashboard/account/tokens). `--linked` uses it to provision
#       a temporary privileged login role via the Management API, which is the
#       ONLY way to dump roles — the prod *pooler* rejects the role dump with
#       "permission denied to set role postgres". No DB password needed for dump.
#   - FTP_HOST / FTP_USER / FTP_PASS : the off-site FTPS server.
# (The old SUPABASE_DB_URL / backup_ro pooler secret is no longer used here —
#  --linked supersedes it.)
# ============================================================================

name: Backup Supabase DB

on:
  schedule:
    # Runs every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

env:
  PROJECT_REF: xwivdlgkywhhonbsdzmm

jobs:
  backup-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Pinned to match the locally-verified CLI; bump deliberately.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Dump (3-file recovery method)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$PROJECT_REF"

          STAMP=$(date +%Y%m%d-%H%M%S)
          DIR="eggplant-backup-${STAMP}"
          mkdir -p "$DIR"

          supabase db dump --linked -f "$DIR/roles.sql"  --role-only
          supabase db dump --linked -f "$DIR/schema.sql"
          supabase db dump --linked -f "$DIR/data.sql"   --use-copy --data-only \
            -x storage.buckets_vectors -x storage.vector_indexes

          tar -czf "${DIR}.tar.gz" "$DIR"
          echo "BACKUP_DIR=$DIR"        >> "$GITHUB_ENV"
          echo "BACKUP_FILE=${DIR}.tar.gz" >> "$GITHUB_ENV"
          echo "✅ Backup created: ${DIR}.tar.gz"

      # Content checks beat a size check: a single frozen/empty dump can stay
      # "big enough" for weeks. Require real roles, tables, and COPY data blocks.
      - name: Validate Backup
        run: |
          set -euo pipefail
          D="${{ env.BACKUP_DIR }}"
          grep -q 'ROLE'          "$D/roles.sql"  || { echo "❌ roles.sql has no ROLE statements";   exit 1; }
          grep -q 'CREATE TABLE'  "$D/schema.sql" || { echo "❌ schema.sql has no CREATE TABLE";       exit 1; }
          grep -q '^COPY '        "$D/data.sql"   || { echo "❌ data.sql has no COPY data blocks";      exit 1; }
          SIZE=$(stat --format=%s "${{ env.BACKUP_FILE }}")
          [ "$SIZE" -ge 1024 ] || { echo "❌ tarball too small ($SIZE bytes)"; exit 1; }
          echo "📦 Validated — tarball $SIZE bytes (roles + schema + data all non-empty)"

      - name: Upload via FTPS and Clean Old Backups
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          REMOTE_DIR: /db_backup_eggplant_ai_notes/
        run: |
          # ssl:verify-certificate no — shared hosts often have mismatched certs;
          # the connection is still TLS-encrypted, we just can't verify identity.
          lftp -c "
            set ftp:ssl-auth TLS
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            mkdir -p -f '$REMOTE_DIR';
            put -O '$REMOTE_DIR' '${{ env.BACKUP_FILE }}';
            bye
          "
          echo "✅ Upload complete"

          # --- Prune backups older than 7 days ---
          CUTOFF=$(date -d '7 days ago' +%Y%m%d)
          FILE_LIST=$(lftp -c "
            set ftp:ssl-auth TLS
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            cd '$REMOTE_DIR';
            cls -1 *.tar.gz
          ")
          DELETE_CMDS=""
          while read -r FILE; do
            [ -z "$FILE" ] && continue
            # eggplant-backup-YYYYMMDD-HHMMSS.tar.gz
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
            if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF" ]; then
              echo "🗑️ Will delete: $FILE"
              DELETE_CMDS="${DELETE_CMDS}rm '${REMOTE_DIR}${FILE}';"
            fi
          done <<< "$FILE_LIST"
          if [ -n "$DELETE_CMDS" ]; then
            lftp -c "
              set ftp:ssl-auth TLS
              set ftp:ssl-force true
              set ftp:ssl-protect-data true
              set ssl:verify-certificate no
              open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
              ${DELETE_CMDS}
            "
          fi
          echo "✅ Cleanup complete — kept last 7 days of backups"
