# ============================================================================
# Daily Supabase Postgres → FTPS Backup
# ============================================================================
# Ported from the wykonczymy reference repo (Neon → here Supabase). The dump,
# gzip, validate, FTPS-upload and 7-day-prune steps are identical; only the
# source DB and connection string differ.
#
# What it does:
#   1. Spins up a temporary Postgres 17 Docker container to dump the database
#   2. Compresses the dump with gzip
#   3. Validates the backup isn't empty/corrupt
#   4. Uploads it to the remote server via secure FTPS
#   5. Removes backups older than 7 days from the remote server
#
# Secrets required (GitHub repo → Settings → Secrets and variables → Actions):
#   - SUPABASE_DB_URL : Supabase **Session pooler** connection string, using a
#                       dedicated read-only backup role (see role setup below).
#       ── Host: use the *Session pooler* string from Supabase → Project
#          Settings → Database → Connection string → "Session pooler", NOT the
#          direct (db.<ref>.supabase.co) one. GitHub-hosted runners are IPv4-only
#          and the direct host is IPv6-only without the paid IPv4 add-on, so a
#          direct URL fails to connect. Session mode (port 5432 on the pooler
#          host) — NOT transaction mode (6543) — is required: pg_dump needs a
#          real session, which the transaction pooler doesn't provide.
#       ── Role: do NOT embed the `postgres` superuser password (it's managed by
#          the Vercel Supabase integration — rotating it would desync prod). Use
#          a dedicated role created once in the Supabase SQL editor:
#               create role backup_ro login password '<pick-a-strong-one>';
#               grant pg_read_all_data to backup_ro;   -- SELECT on everything
#               alter role backup_ro with bypassrls;   -- read RLS-protected
#                                                       -- tables (auth.*, etc.)
#          The pooler username is then `backup_ro.<project-ref>`. BYPASSRLS is
#          mandatory: without it pg_dump fails on the first RLS table
#          (`query would be affected by row-level security policy`). The role is
#          read-only, so a leaked secret can only read data, never mutate it.
#   - FTP_HOST / FTP_USER / FTP_PASS : same FTPS server as the reference repo.
# ============================================================================

name: Backup Supabase DB

on:
  schedule:
    # Runs every day at 2:00 AM UTC
    - cron: '0 2 * * *'

  # Allows you to trigger this workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  backup-and-upload:
    runs-on: ubuntu-latest
    # Safety net: kill the job if it hangs longer than 10 minutes
    timeout-minutes: 10

    steps:
      # lftp is a command-line FTP/FTPS client — not pre-installed on GitHub runners
      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Disposable Docker container with pg_dump (matches the Supabase server's
      # major version — 17 — so the dump format is never rejected as too new/old).
      # The container connects to Supabase, dumps the DB, and pipes to gzip on the host.
      - name: Create Backup with Docker
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          FILENAME="eggplant-backup-${TIMESTAMP}.sql.gz"

          # pg_dump flags:
          #   --no-owner        : skip ownership commands (restore to a different user)
          #   --no-privileges   : skip GRANT/REVOKE statements
          #   --clean           : add DROP statements before CREATE (for clean restore)
          #   --if-exists       : don't error if objects don't exist yet when dropping
          docker run --rm \
            postgres:17-alpine \
            pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges --clean --if-exists \
            | gzip > "$FILENAME"

          # Make the filename available to subsequent steps via GitHub env
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "✅ Backup created: $FILENAME"

      # Verify the backup file exists and isn't suspiciously small.
      # A valid compressed dump should be at least 1KB. If pg_dump failed
      # silently we'd get an empty or tiny file.
      - name: Validate Backup
        run: |
          FILE_SIZE=$(stat --format=%s "${{ env.BACKUP_FILE }}")
          echo "📦 Backup size: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -lt 1024 ]; then
            echo "❌ Backup file is too small ($FILE_SIZE bytes) — likely corrupt or empty"
            exit 1
          fi

      # Upload the backup via FTPS (FTP over TLS — encrypted connection),
      # then clean up old backups to prevent disk space from filling up.
      - name: Upload via FTPS and Clean Old Backups
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          REMOTE_DIR: /db_backup_eggplant_notes/
        run: |
          # --- Upload ---
          # ssl:verify-certificate no — many shared hosting providers have mismatched certs.
          # The connection is still encrypted (TLS), we just can't verify server identity.
          lftp -c "
            set ftp:ssl-auth TLS
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            mkdir -p -f '$REMOTE_DIR';
            put -O '$REMOTE_DIR' '${{ env.BACKUP_FILE }}';
            bye
          "
          echo "✅ Upload complete"

          # --- Clean up backups older than 7 days ---
          # How it works:
          #   1. List remote files in a single lftp session
          #   2. Build a list of old files by comparing dates locally
          #   3. Delete all old files in one lftp session (single connection = fast)
          CUTOFF=$(date -d '7 days ago' +%Y%m%d)

          # Step 1: Get file list from remote (single connection)
          FILE_LIST=$(lftp -c "
            set ftp:ssl-auth TLS
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            cd '$REMOTE_DIR';
            cls -1 *.sql.gz
          ")

          # Step 2: Build lftp delete commands for old files
          DELETE_CMDS=""
          while read -r FILE; do
            [ -z "$FILE" ] && continue
            # Extract date from filename: eggplant-backup-YYYYMMDD-HHMMSS.sql.gz
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
            if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF" ]; then
              echo "🗑️ Will delete: $FILE"
              DELETE_CMDS="${DELETE_CMDS}rm '${REMOTE_DIR}${FILE}';"
            fi
          done <<< "$FILE_LIST"

          # Step 3: Execute all deletions in one connection (if any)
          if [ -n "$DELETE_CMDS" ]; then
            lftp -c "
              set ftp:ssl-auth TLS
              set ftp:ssl-force true
              set ftp:ssl-protect-data true
              set ssl:verify-certificate no
              open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
              ${DELETE_CMDS}
            "
          fi

          echo "✅ Cleanup complete — kept last 7 days of backups"
